[workspace]
authors = ["Kevin Mills <millsks@gmail.com>"]
channels = ["conda-forge"]
name = "habitflow-web"
description = "HabitFlow: web app for tracking daily habits (Django + React)"
platforms = ["osx-arm64"]
version = "0.1.0"

# Feature environments for backend and frontend isolation
[environments.backend]
features = ["backend"]
solve-group = "backend"

[environments.frontend]
features = ["frontend"]
solve-group = "frontend"

# Default environment includes both features
[environments.default]
features = ["backend", "frontend"]

# Shared tasks for the workspace
[tasks]
install-frontend-deps = "npm --prefix frontend install"

test-backend = "test -d backend/test && pytest backend/test -q"
test-frontend = { cmd = "npm --prefix frontend run test", depends-on = ["install-frontend-deps"] }
test = { cmd = "pixi run test-backend && pixi run test-frontend", description = "Run all tests" }

lint-backend = "test -d backend/src && test -d backend/test && ruff check backend/src backend/test"
lint-frontend = { cmd = "npm --prefix frontend run lint", depends-on = ["install-frontend-deps"] }
lint = { cmd = "pixi run lint-backend && pixi run lint-frontend", description = "Run all linting" }

format-backend = "test -d backend/src && test -d backend/test && ruff format backend/src backend/test"
format-frontend = { cmd = "npm --prefix frontend run format", depends-on = ["install-frontend-deps"] }
format = { cmd = "pixi run format-backend && pixi run format-frontend", description = "Format all code" }

typecheck-backend = "test -d backend/src && mypy backend/src"
typecheck-frontend = { cmd = "npm --prefix frontend run typecheck", depends-on = ["install-frontend-deps"] }
typecheck = { cmd = "pixi run typecheck-backend && pixi run typecheck-frontend", description = "Type check all code" }

build-backend = "test -f backend/pyproject.toml && python -m build backend"
build-frontend = { cmd = "npm --prefix frontend run build", depends-on = ["install-frontend-deps"] }
build = { cmd = "pixi run build-backend && pixi run build-frontend", description = "Build all packages" }

ci = { cmd = "pixi run lint && pixi run typecheck && pixi run test && pixi run build", description = "Full CI validation" }

start-info = "echo 'HabitFlow development environment ready. Use pixi run start to launch frontend dev server.'"
start = { cmd = "npm --prefix frontend run dev", depends-on = ["install-frontend-deps"] }
install-playwright-browser = { cmd = "npm --prefix frontend exec playwright install chromium", depends-on = ["install-frontend-deps"] }
screenshot-home = { cmd = "npm --prefix frontend exec playwright screenshot --device='Desktop Chrome' http://localhost:3000 ../docs/screenshots/story-1-0-bootstrap-home.png", depends-on = ["install-frontend-deps"] }

# Backend feature
[feature.backend.dependencies]
python = ">=3.12,<3.13"

[feature.backend.pypi-dependencies]
pytest = ">=7.4"
pytest-cov = ">=4.1"
ruff = ">=0.1.0"
mypy = ">=1.5"
black = ">=23.0"
hatch = ">=1.7"
build = ">=1.0"

# Frontend feature
[feature.frontend.dependencies]
nodejs = ">=18,<19"
